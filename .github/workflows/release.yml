name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      - name: Package
        shell: bash
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          NAME="lazyjira-${VERSION_TAG}-${TARGET}"
          mkdir "${NAME}"

          case "${{ runner.os }}" in
            Windows)
              cp target/release/lazyjira.exe "${NAME}/"
              powershell Compress-Archive -Path "${NAME}" -DestinationPath "${NAME}.zip"
              hash="$(openssl dgst -sha256 "${NAME}.zip" | awk '{print $2}')"
              printf '%s  %s\n' "$hash" "${NAME}.zip" > "${NAME}.zip.sha256"
              ;;
            *)
              cp target/release/lazyjira "${NAME}/"
              tar czf "${NAME}.tar.gz" "${NAME}"
              hash="$(openssl dgst -sha256 "${NAME}.tar.gz" | awk '{print $2}')"
              printf '%s  %s\n' "$hash" "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.target }}
          path: |
            lazyjira-*.tar.gz
            lazyjira-*.tar.gz.sha256
            lazyjira-*.zip
            lazyjira-*.zip.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          merge-multiple: true
          path: assets

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: assets/*
